edition: 3.0.0
name: hono-bun-fc
access: default

vars:
  region: cn-hongkong
  serviceName: hono-agent
  functionName: hono-agent-web
  description: Hono Agent for deploying to Alibaba Cloud Function Compute
  bunLayerArn: ${env(BUN_LAYER_ARN)}

resources:
  backend:
    component: fc3
    props:
      region: ${vars.region}
      functionName: ${vars.functionName}
      description: ${vars.description}
      runtime: custom.debian11
      code: ./
      memorySize: 256
      timeout: 60
      instanceConcurrency: 10
      internetAccess: true
      logConfig:
        project: javascript-project
        logstore: hono-agent
        enableRequestMetrics: true
        enableInstanceMetrics: true
        logBeginRule: DefaultRegex
      environmentVariables:
        PORT: "9000"
        HOST: "0.0.0.0"
        DATABASE_URL: ${env(DATABASE_URL)}
      layers:
        - ${vars.bunLayerArn}
      customRuntimeConfig:
        command:
          - /code/bootstrap
        port: 9000
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - HEAD
              - OPTIONS
